<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}smashedburger{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='tailwind.css') }}">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #1a1b2e; color: #e2e4ea;
                 font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    input:focus { outline: none; border-color: #3b5bdb !important; }
    .auth-input {
      width: 100%; background: #2a2b3d; border: 1px solid #2e3050;
      border-radius: 6px; padding: 9px 12px; color: #e2e4ea; font-size: 0.85rem;
      font-family: inherit; transition: border-color 0.15s;
    }
    .auth-btn {
      width: 100%; background: #3b5bdb; color: #fff; border: none;
      border-radius: 6px; padding: 10px; font-size: 0.85rem; font-family: inherit;
      cursor: pointer; transition: background 0.15s;
    }
    .auth-btn:hover { background: #4c6ce8; }
    .auth-link { color: #9ea3b0; font-size: 0.78rem; text-decoration: none; }
    .auth-link:hover { color: #e2e4ea; }
    label { display: block; font-size: 0.75rem; color: #9ea3b0; margin-bottom: 5px; }
    .field { margin-bottom: 1rem; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="text-lg tracking-widest text-tx-1">smashedburger</div>
      <div class="text-xs text-tx-3 mt-1">security consultant</div>
    </div>
    <div style="background:#1e2040;border:1px solid #2e3050;border-radius:12px;padding:2rem;">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div style="margin-bottom:1rem;padding:8px 12px;border-radius:6px;font-size:0.8rem;
               {% if category == 'error' %}background:rgba(239,68,68,0.15);color:#fca5a5;
               {% else %}background:rgba(34,197,94,0.12);color:#86efac;{% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      {% endwith %}
      {% block content %}{% endblock %}
    </div>
    <div class="text-center mt-4">{% block footer %}{% endblock %}</div>
  </div>
</body>
</html>
