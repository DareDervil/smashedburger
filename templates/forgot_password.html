{% extends "auth_base.html" %}
{% block title %}Reset password — smashedburger{% endblock %}
{% block content %}
  <div style="font-size:0.9rem;color:#e2e4ea;margin-bottom:0.4rem;font-weight:600;">Reset password</div>
  <div style="font-size:0.78rem;color:#9ea3b0;margin-bottom:1.5rem;">Enter your email and we'll send a reset link valid for 15 minutes.</div>
  <form method="post">
    <div class="field">
      <label>Email</label>
      <input class="auth-input" type="email" name="email" autocomplete="email" required autofocus />
    </div>
    <button class="auth-btn" type="submit">Send reset link</button>
  </form>
{% endblock %}
{% block footer %}
  <a class="auth-link" href="{{ url_for('auth.login') }}">← Back to login</a>
{% endblock %}
