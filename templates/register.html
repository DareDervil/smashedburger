{% extends "auth_base.html" %}
{% block title %}Create account — smashedburger{% endblock %}
{% block content %}
  <div style="font-size:0.9rem;color:#e2e4ea;margin-bottom:1.5rem;font-weight:600;">Create account</div>
  <form method="post">
    <div class="field">
      <label>Username</label>
      <input class="auth-input" type="text" name="username" autocomplete="username" required />
    </div>
    <div class="field">
      <label>Email</label>
      <input class="auth-input" type="email" name="email" autocomplete="email" required />
    </div>
    <div class="field">
      <label>Password</label>
      <input class="auth-input" type="password" name="password" autocomplete="new-password" required />
    </div>
    <div class="field">
      <label>Confirm password</label>
      <input class="auth-input" type="password" name="password2" autocomplete="new-password" required />
    </div>
    <div style="font-size:0.72rem;color:#6b7280;margin-bottom:1rem;">
      ≥15 characters · uppercase · lowercase · digit · symbol
    </div>
    <button class="auth-btn" type="submit">Create account</button>
  </form>
{% endblock %}
{% block footer %}
  <a class="auth-link" href="{{ url_for('auth.login') }}">Already have an account? Sign in</a>
{% endblock %}
