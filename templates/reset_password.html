{% extends "auth_base.html" %}
{% block title %}New password — smashedburger{% endblock %}
{% block content %}
  <div style="font-size:0.9rem;color:#e2e4ea;margin-bottom:1.5rem;font-weight:600;">Set new password</div>
  <form method="post">
    <div class="field">
      <label>New password</label>
      <input class="auth-input" type="password" name="password" autocomplete="new-password" required autofocus />
    </div>
    <div class="field">
      <label>Confirm password</label>
      <input class="auth-input" type="password" name="password2" autocomplete="new-password" required />
    </div>
    <div style="font-size:0.72rem;color:#6b7280;margin-bottom:1rem;">
      ≥15 characters · uppercase · lowercase · digit · symbol
    </div>
    <button class="auth-btn" type="submit">Update password</button>
  </form>
{% endblock %}
{% block footer %}
  <a class="auth-link" href="{{ url_for('auth.login') }}">← Back to login</a>
{% endblock %}
